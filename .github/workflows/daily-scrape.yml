name: Work Sharp Daily Price Scrape

on:
  schedule:
    - cron: '0 21 * * *'   # 7 AM AEST (UTC+10) = 9 PM UTC previous day
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit CSV files back to repo

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Run price scrape
        env:
          FIRECRAWL_KEY: ${{ secrets.FIRECRAWL_KEY }}
        run: node scrape.js

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-prices.csv history/
          git diff --staged --quiet || git commit -m "Price scrape $(date +%Y-%m-%d)"
          git push
